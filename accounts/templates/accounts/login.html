{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'main/css/signup.css' %}">
    <link rel="stylesheet" href="{% static 'main/css/signup_animation.css' %}">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="smilebird">
            {% include 'pages/_smilebird_svg.html' %}
            </div>
            <div class="bubble-box">
                <div class="bubble">
                {% include 'pages/_bubble_svg.html' %}
                </div>
                <div class="bubble-text">
                    반가워요!<br>
                    로그인하고 함께 루틴 지켜갈 준비 되셨나요?</div>
            </div>
        </div>
        <div class="content">
            <div class="main">
                <form action="{% url 'accounts:login' %}" method="POST" class="form-box" novalidate>
                {% csrf_token %}
                <div class="block">
                    <label for="email">이메일 주소</label>
                    <div class="input-wrapper">
                        <input
                        type="email"
                        id="user-email"
                        name="email"
                        >
                        <div  class="x-button" id="clear-email">
                            <svg class="x" xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 19 19" fill="none">
                                <path d="M9.5 0C4.25329 0 0 4.25329 0 9.5C0 14.7467 4.25329 19 9.5 19C14.7467 19 19 14.7467 19 9.5C18.9943 4.25563 14.7444 0.00567773 9.5 0ZM12.6667 11.548C12.9884 11.8441 13.0091 12.345 12.713 12.6667C12.4169 12.9884 11.9161 13.0091 11.5944 12.713C11.5783 12.6982 11.5629 12.6828 11.548 12.6667L9.5 10.6194L7.45275 12.6667C7.13825 12.9704 6.63709 12.9617 6.33335 12.6472C6.03706 12.3404 6.03706 11.854 6.33335 11.5472L8.3806 9.5L6.33335 7.45275C6.02961 7.13825 6.03833 6.63709 6.35283 6.33335C6.65961 6.03706 7.14597 6.03706 7.45275 6.33335L9.5 8.3806L11.548 6.33335C11.8441 6.01164 12.345 5.99086 12.6667 6.28696C12.9884 6.58306 13.0091 7.08388 12.713 7.40558C12.6982 7.42169 12.6828 7.43713 12.6667 7.45197L10.6194 9.5L12.6667 11.548Z" fill="#8F8E8E"/>
                            </svg>
                        </div>
                    </div>
                    <p class="bottom-text"></p>
                </div>
                <div class="block">
                    <label for="password">비밀번호</label>
                    <div class="input-wrapper">
                        <input
                        type="password"
                        id="user-password"
                        name="password"
                        >
                        <div  class="x-button" id="clear-password">
                            <svg class="x" xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 19 19" fill="none">
                                <path d="M9.5 0C4.25329 0 0 4.25329 0 9.5C0 14.7467 4.25329 19 9.5 19C14.7467 19 19 14.7467 19 9.5C18.9943 4.25563 14.7444 0.00567773 9.5 0ZM12.6667 11.548C12.9884 11.8441 13.0091 12.345 12.713 12.6667C12.4169 12.9884 11.9161 13.0091 11.5944 12.713C11.5783 12.6982 11.5629 12.6828 11.548 12.6667L9.5 10.6194L7.45275 12.6667C7.13825 12.9704 6.63709 12.9617 6.33335 12.6472C6.03706 12.3404 6.03706 11.854 6.33335 11.5472L8.3806 9.5L6.33335 7.45275C6.02961 7.13825 6.03833 6.63709 6.35283 6.33335C6.65961 6.03706 7.14597 6.03706 7.45275 6.33335L9.5 8.3806L11.548 6.33335C11.8441 6.01164 12.345 5.99086 12.6667 6.28696C12.9884 6.58306 13.0091 7.08388 12.713 7.40558C12.6982 7.42169 12.6828 7.43713 12.6667 7.45197L10.6194 9.5L12.6667 11.548Z" fill="#8F8E8E"/>
                            </svg>
                        </div>
                    </div>
                    <p class="bottom-text"></p>
                </div>
                
            </div>
            <button type="submit" class="button">
                <p class="button-text">로그인</p>
            </button>
            </form>
        </div>
    </div>
<script>

document.addEventListener('DOMContentLoaded', function() {

    const emailInput = document.getElementById('user-email');
    const passwordInput = document.getElementById('user-password');
    const signupBtn = document.querySelector('.button');

    const clearEmail = document.getElementById('clear-email');
    const clearPassword = document.getElementById('clear-password');

    function checkFormValidity() {
        const isEmailFilled = emailInput.value.trim().length > 0;
        const isPasswordFilled = passwordInput.value.length > 0;

        if (isEmailFilled && isPasswordFilled) {
            signupBtn.disabled = false;
            signupBtn.classList.add('active');
        } else {
            signupBtn.disabled = true;
            signupBtn.classList.remove('active');
        }
    }

    emailInput.addEventListener('input', checkFormValidity);
    passwordInput.addEventListener('input', checkFormValidity);

    function setupClearButton(btn, input) {
        if (btn && input) {
            btn.addEventListener('click', function() {
                input.value = '';
                input.focus();
                checkFormValidity();
            });
        }
    }

    setupClearButton(clearEmail, emailInput);
    setupClearButton(clearPassword, passwordInput);

    checkFormValidity();

});

</script>
</body>
</html>
